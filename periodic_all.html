<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Properties — JEE Master Table</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg-0:#000000;
    --bg-1:#000000;
    --bg-2:#0c1f35;
    --card:#0b1b2e;
    --card-2:#10253e;
    --line:#27496d;
    --text:#d7e9ff;
    --muted:#86a7cc;
    --accent:#7cc2ff;
    --glow:rgba(124,194,255,.2);
  }
  html, body { width: 100%; min-height: 100%; }
  body {
    background: #000;
    font-family: Inter, "Segoe UI", "SF Pro Display", Roboto, Arial, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: clamp(12px, 2vw, 28px);
  }
  .app {
    width: min(100%, 1840px);
    min-height: calc(100vh - clamp(24px, 4vw, 56px));
    margin: 0 auto;
    border: 1px solid rgba(124,194,255,.2);
    border-radius: 18px;
    padding: clamp(14px, 2vw, 26px);
    background: #000;
    box-shadow: 0 28px 90px rgba(0,0,0,.42), inset 0 0 0 1px rgba(140,212,255,.06);
    backdrop-filter: blur(8px);
  }
  h1 { font-size: clamp(18px, 2.15vw, 34px); letter-spacing: 1.6px; text-transform: uppercase; color: #b5ddff; margin-bottom: 5px; }
  .subtitle { font-size: clamp(12px, 1.05vw, 16px); color: var(--muted); margin-bottom: 16px; letter-spacing: .6px; }

  /* TABS */
  .tab-group { margin-bottom: 10px; }
  .tab-group-label { font-size: 11px; color: #6b8fb8; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 7px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .tab { padding: 8px 15px; font-size: 13px; letter-spacing: .4px; border: 1px solid #2c537a; background: rgba(7,21,37,.85); color: #98bddf; border-radius: 9px; cursor: pointer; transition: all .16s; white-space: nowrap; }
  .tab:hover { border-color: #7bbffe; color: #d9edff; transform: translateY(-1px); box-shadow: 0 0 0 4px var(--glow); }
  .tab.active { background: linear-gradient(180deg, #184067, #103254); border-color: #8fcbff; color: #f4fbff; box-shadow: 0 0 0 4px var(--glow); }
  .tab-divider { width: 1px; background: #2d4d70; margin: 0 6px; }

  /* PANEL */
  .panel { background: linear-gradient(160deg, rgba(16,37,61,.9), rgba(10,24,42,.86)); border: 1px solid var(--line); border-radius: 14px; padding: 16px 20px; margin-bottom: 14px; min-height: 95px; display: flex; align-items: center; gap: 20px; }
  .p-sym { font-size: clamp(46px, 3vw, 64px); font-weight: 800; min-width: 76px; text-align: center; line-height: 1; transition: color .15s; }
  .p-name { font-size: 12px; color: #8ab1d8; letter-spacing: 1.1px; text-transform: uppercase; }
  .p-val { font-size: clamp(25px, 2vw, 38px); font-weight: 800; line-height: 1.2; margin-top: 2px; }
  .p-note { font-size: 13px; color: #9cc1e6; margin-top: 6px; max-width: 1100px; line-height: 1.5; }
  .p-tag { display: inline-block; font-size: 12px; padding: 5px 12px; border-radius: 99px; margin-top: 8px; letter-spacing: .4px; }

  /* LEGEND */
  .legend-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .legend-bar { display: flex; height: 16px; flex: 1; border-radius: 999px; overflow: hidden; border: 1px solid rgba(166,215,255,.35); }
  .legend-seg { flex: 1; }
  .legend-labels { display: flex; justify-content: space-between; font-size: 11px; color: #89b1da; margin-top: 5px; }
  .legend-side { font-size: 11px; color: #8eb4da; white-space: nowrap; min-width: 0; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }

  /* TABLE */
  .pt-wrap { overflow-x: auto; background: rgba(8,21,38,.72); border: 1px solid var(--line); border-radius: 14px; padding: 14px; box-shadow: inset 0 0 0 1px rgba(140,212,255,.06); }
  .pt { display: flex; flex-direction: column; gap: 4px; width: fit-content; }
  .row { display: flex; gap: 4px; }
  .el { width: 58px; height: 58px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent; flex-shrink: 0; transition: transform .12s, border-color .12s, box-shadow .12s; position: relative; }
  .el:hover { transform: scale(1.2); z-index: 99; border-color: rgba(255,255,255,.5); box-shadow: 0 0 20px rgba(255,255,255,.25); }
  .el.emp { background: transparent !important; cursor: default; pointer-events: none; }
  .el.mk { background: #12253a; border: 1px dashed #4b6e92; cursor: default; pointer-events: none; }
  .el.gh { background: #0c1a2b; cursor: default; pointer-events: none; }
  .el.sm { width: 48px; height: 48px; }
  .sym { font-size: 17px; font-weight: 800; color: #fff; line-height: 1; text-shadow: 0 0 10px rgba(0,0,0,.8); }
  .val { font-size: 12px; color: rgba(255,255,255,.92); line-height: 1.2; }
  .el.sm .sym { font-size: 14px; }
  .el.sm .val { font-size: 10px; }
  .gap-row { height: 8px; }

  /* INSIGHTS REMOVED BY REQUEST */
  @media (max-width: 720px) {
    body { padding: 8px; }
    .app { min-height: calc(100vh - 16px); border-radius: 12px; padding: 10px; }
    .tab { padding: 7px 10px; font-size: 12px; }
    .el { width: 50px; height: 50px; }
    .el.sm { width: 42px; height: 42px; }
  }
</style>
</head>

function getCol(prop,val){
  if(val===null)return'#090f18';
  const p=PROPS[prop];
  let t=(val-p.min)/(p.max-p.min);
  t=Math.max(0,Math.min(1,t));
  if(p.inv)t=1-t;
  const hue=240-t*240;
  const light=20+13*Math.sin(t*Math.PI);
  return`hsl(${Math.round(hue)},70%,${Math.round(light)}%)`;
}

  const p=PROPS[prop];
  let t=(val-p.min)/(p.max-p.min);
  t=Math.max(0,Math.min(1,t));
  if(p.inv)t=1-t;
  return`hsl(${Math.round(240-t*240)},80%,62%)`;
}

// ── STATE ─────────────────────────────────────────────────────────
let cur='srp';

// ── HOVER ─────────────────────────────────────────────────────────
function hover(sym){
  const p=PROPS[cur];
  const val=p.data[sym];
  const bc=getBri(cur,val);
  document.getElementById('p-sym').textContent=sym;
  document.getElementById('p-sym').style.color=bc;
  document.getElementById('p-name').textContent=(N[sym]||sym)+' · '+p.unit;
  document.getElementById('p-val').textContent=val===null?'No data':p.dispFn(val);
  document.getElementById('p-val').style.color=bc;
  const tag=document.getElementById('p-tag');
  if(val!==null){
    tag.textContent=p.tagFn(val);
    tag.style.background=getCol(cur,val);
    tag.style.color=bc;
    tag.style.display='inline-block';
  }else tag.style.display='none';
  document.getElementById('p-note').textContent=p.noteFn(sym);
}

// ── ELEMENT BUILDER ───────────────────────────────────────────────
function mkEl(sym,sm){
  const d=document.createElement('div');
  d.className='el'+(sm?' sm':'');
  if(!sym){d.classList.add('emp');return d;}
  if(sym==='La*'){d.classList.add('mk');d.innerHTML='<span style="font-size:10px;color:#1a2d3e">Ln*</span>';return d;}
  if(sym==='Ac*'){d.classList.add('mk');d.innerHTML='<span style="font-size:10px;color:#1a2d3e">An*</span>';return d;}
  if(!N[sym]){d.classList.add('gh');return d;}
  d.dataset.sym=sym;
  const p=PROPS[cur];
  const val=p.data[sym];
  d.style.background=getCol(cur,val);
  let dv=val===null?'—':(cur==='en'?val.toFixed(2):cur==='den'?val.toFixed(1):cur==='mc'?val:val);
  d.innerHTML=`<span class="sym">${sym}</span><span class="val">${dv}</span>`;
  d.addEventListener('mouseenter',()=>hover(sym));
  return d;
}

// ── BUILD TABLE ───────────────────────────────────────────────────
function buildTable(){
  const pt=document.getElementById('pt');
  pt.innerHTML='';
  LAYOUT.forEach(row=>{
    const r=document.createElement('div');r.className='row';
    row.forEach(s=>r.appendChild(mkEl(s===0?null:s,false)));
    pt.appendChild(r);
  });
  const gap=document.createElement('div');gap.className='gap-row';pt.appendChild(gap);
  [LN,AN].forEach(row=>{
    const r=document.createElement('div');r.className='row';
    row.forEach(s=>r.appendChild(mkEl(s===0?null:s,true)));
    pt.appendChild(r);
  });
}

function refreshColors(){
  document.querySelectorAll('.el[data-sym]').forEach(el=>{
    const sym=el.dataset.sym;
    const p=PROPS[cur];
    const val=p.data[sym];
    el.style.background=getCol(cur,val);
    const ve=el.querySelector('.val');
    if(ve)ve.textContent=val===null?'—':(cur==='en'?val.toFixed(2):cur==='den'?val.toFixed(1):cur==='mc'?val:val);
  });
}

// ── LEGEND ────────────────────────────────────────────────────────
function buildLegend(){
  const p=PROPS[cur];
  document.getElementById('leg-lo').textContent=p.loLbl;
  document.getElementById('leg-hi').textContent=p.hiLbl;
  document.getElementById('ll1').textContent=p.ll[0];
  document.getElementById('ll2').textContent=p.ll[1];
  document.getElementById('ll3').textContent=p.ll[2];
  const lb=document.getElementById('legbar');lb.innerHTML='';
  for(let i=0;i<=24;i++){
    const t=i/24;
    const val=p.min+t*(p.max-p.min);
    const seg=document.createElement('div');seg.className='legend-seg';
    seg.style.background=getCol(cur,val);
    lb.appendChild(seg);
  }
}

// ── TABS ──────────────────────────────────────────────────────────
function buildTabs(){
  const bar=document.getElementById('tab-bar');
  Object.entries(PROPS).forEach(([key,p])=>{
    const t=document.createElement('div');
    t.className='tab'+(key===cur?' active':'');
    t.textContent=p.label;
    t.onclick=()=>setTab(key);
    bar.appendChild(t);
  });
}

function setTab(prop){
  cur=prop;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',Object.keys(PROPS)[i]===prop);
  });
  refreshColors();
  buildLegend();
  document.getElementById('p-sym').textContent='—';
  document.getElementById('p-sym').style.color='#8ab1d8';
  document.getElementById('p-name').textContent='hover any element';
  document.getElementById('p-val').textContent='—';
  document.getElementById('p-val').style.color='#8ab1d8';
  document.getElementById('p-tag').style.display='none';
  document.getElementById('p-note').textContent='';
}

function initApp(){
  buildTabs();
  buildTable();
  buildLegend();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initApp);
}else{
  initApp();
}
</script>
</body>
</html>
